<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shelter Plugins</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel-border: #343a46;
        --text: #eceff4;
        --muted: #a7b0bf;
        --accent: #232935;
        --accent-hover: #2b3241;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 24px;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, sans-serif;
      }

      main {
        max-width: 640px;
        margin: 0 auto;
      }

      .card {
        border: 1px solid var(--panel-border);
        padding: 24px;
        background: #151922;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.25rem;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .plugin {
        margin-top: 20px;
        padding: 16px;
        border: 1px solid var(--panel-border);
        background: #10141b;
      }

      .plugin-name {
        margin: 0 0 6px;
        font-size: 1rem;
      }

      .plugin-url {
        margin: 0 0 12px;
        word-break: break-all;
        color: var(--accent);
        font-size: 0.95rem;
      }

      button {
        border: 1px solid #999999;
        padding: 10px 14px;
        background: var(--accent);
        color: var(--text);
        font: inherit;
        cursor: pointer;
      }

      button:hover {
        background: var(--accent-hover);
      }

      button:focus-visible {
        outline: 1px dotted #eceff4;
        outline-offset: 2px;
      }

      .status {
        margin-left: 12px;
        color: var(--muted);
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Shelter Plugins</h1>

        <div class="plugin">
          <p class="plugin-name">gpt</p>
          <p class="plugin-url" id="plugin-url">plugins/gpt/plugin.json</p>
          <div>
            <button id="copy-button" type="button">Copy URL</button>
            <span class="status" id="copy-status" aria-live="polite"></span>
          </div>
        </div>
      </section>
    </main>

    <script>
      const pluginPath = "plugins/gpt/plugin.json";
      const pluginUrl = new URL(pluginPath, window.location.href).href;

      document.getElementById("plugin-url").textContent = pluginUrl;

      const copyButton = document.getElementById("copy-button");
      const copyStatus = document.getElementById("copy-status");

      const setStatus = (message) => {
        copyStatus.textContent = message;
      };

      copyButton.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(pluginUrl);
          setStatus("Copied");
        } catch (error) {
          const range = document.createRange();
          range.selectNodeContents(document.getElementById("plugin-url"));

          const selection = window.getSelection();
          selection.removeAllRanges();
          selection.addRange(range);

          try {
            document.execCommand("copy");
            setStatus("Copied");
          } catch (fallbackError) {
            setStatus("Copy failed");
          }

          selection.removeAllRanges();
        }
      });
    </script>
  </body>
</html>
